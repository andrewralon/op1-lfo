<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 22">
  <!-- Up arrowhead (solid) -->
  <polygon points="10,1 7,6 13,6" fill="#aaaaaa"/>
  <!-- Vertical stem (solid) -->
  <line x1="10" y1="6" x2="10" y2="16" stroke="#aaaaaa" stroke-width="1.5"/>
  <!-- Down arrowhead (solid) -->
  <polygon points="10,21 7,16 13,16" fill="#aaaaaa"/>
  <!-- Dotted crossbar: two halves from center outward for perfect symmetry -->
  <line x1="10" y1="11" x2="1" y2="11" stroke="#aaaaaa" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="10" y1="11" x2="19" y2="11" stroke="#aaaaaa" stroke-width="1.5" stroke-dasharray="2,2"/>
</svg>
